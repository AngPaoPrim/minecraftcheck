<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Minecraft Server</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060810;
    --surface: #0d1117;
    --panel: #111827;
    --border: #1e2a3a;
    --border-light: #2a3a50;
    --emerald: #17dd62;
    --emerald-dim: rgba(23,221,98,0.15);
    --gold: #ffd700;
    --red: #e03030;
    --blue: #3b82f6;
    --text: #a0b8c8;
    --text-dim: rgba(160,184,200,0.4);
    --text-bright: #d0e8f8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 19px, rgba(23,221,98,0.02) 19px, rgba(23,221,98,0.02) 20px),
      repeating-linear-gradient(90deg, transparent, transparent 19px, rgba(23,221,98,0.02) 19px, rgba(23,221,98,0.02) 20px);
    color: var(--text);
    font-family: 'VT323', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* Scanlines overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.07) 0px,
      rgba(0,0,0,0.07) 1px,
      transparent 1px,
      transparent 2px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .wrapper {
    width: 100%;
    max-width: 720px;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 2px 2px 0 0;
  }

  .topbar-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--emerald);
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(23,221,98,0.5);
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    color: var(--text-dim);
  }

  .back-link {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s;
    letter-spacing: 1px;
  }

  .back-link:hover { color: var(--text); }

  /* Main card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    border-radius: 0 0 2px 2px;
  }

  /* --- LOGIN SCREEN --- */
  #login {
    text-align: center;
    padding: 20px 0;
  }

  .login-icon {
    font-size: 48px;
    margin-bottom: 16px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .login-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-shadow: 0 0 15px rgba(255,215,0,0.4);
  }

  .login-subtitle {
    font-size: 18px;
    color: var(--text-dim);
    margin-bottom: 28px;
  }

  .input-group {
    position: relative;
    margin-bottom: 12px;
  }

  .input-group label {
    display: block;
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 6px;
    text-align: left;
    font-size: 12px;
  }

  input[type="password"], input[type="text"] {
    width: 100%;
    padding: 12px 16px;
    background: var(--panel);
    border: 2px solid var(--border);
    border-top-color: var(--border-light);
    border-left-color: var(--border-light);
    color: var(--emerald);
    font-family: 'VT323', monospace;
    font-size: 22px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 3px;
    border-radius: 2px;
    caret-color: var(--emerald);
  }

  input:focus {
    border-color: rgba(23,221,98,0.4);
    box-shadow: 0 0 0 1px rgba(23,221,98,0.15), inset 0 0 20px rgba(23,221,98,0.05);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }

  .btn-primary {
    background: var(--emerald);
    color: #000;
    width: 100%;
    justify-content: center;
    margin-top: 8px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.4), 0 0 20px rgba(23,221,98,0.2);
  }

  .btn-primary:hover {
    background: #22ff77;
    transform: translateY(-1px);
    box-shadow: 0 6px 0 rgba(0,0,0,0.4), 0 0 30px rgba(23,221,98,0.4);
  }

  .btn-primary:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 rgba(0,0,0,0.4);
  }

  .btn-secondary {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border-light);
    font-size: 8px;
    padding: 8px 14px;
  }

  .btn-secondary:hover {
    background: var(--border-light);
    color: var(--text-bright);
  }

  .btn-danger {
    background: rgba(224,48,48,0.15);
    color: var(--red);
    border: 1px solid rgba(224,48,48,0.3);
    font-size: 8px;
    padding: 8px 14px;
  }

  .btn-danger:hover {
    background: rgba(224,48,48,0.25);
    border-color: rgba(224,48,48,0.5);
  }

  .error-msg {
    font-size: 18px;
    color: var(--red);
    margin-top: 10px;
    min-height: 24px;
    text-align: center;
    letter-spacing: 1px;
  }

  /* --- ADMIN PANEL --- */
  #panel { display: none; }

  .panel-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .section-badge {
    font-size: 13px;
    color: var(--text-dim);
    background: var(--panel);
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 2px;
  }

  /* Console */
  #console {
    background: #03060a;
    border: 1px solid var(--border);
    border-top-color: var(--border-light);
    border-left-color: var(--border-light);
    height: 280px;
    overflow-y: auto;
    padding: 12px;
    font-size: 17px;
    line-height: 1.7;
    border-radius: 2px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  #console::-webkit-scrollbar { width: 4px; }
  #console::-webkit-scrollbar-track { background: transparent; }
  #console::-webkit-scrollbar-thumb { background: var(--border-light); }

  .log-line {
    display: flex;
    gap: 8px;
    align-items: baseline;
    padding: 1px 0;
    animation: slideIn 0.1s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-4px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .log-time {
    color: var(--text-dim);
    flex-shrink: 0;
    font-size: 14px;
  }

  .log-prefix {
    flex-shrink: 0;
    font-weight: bold;
  }

  .log-cmd .log-prefix { color: var(--gold); }
  .log-output .log-prefix { color: var(--emerald); }
  .log-error .log-prefix { color: var(--red); }
  .log-system .log-prefix { color: var(--blue); }

  .log-cmd .log-text { color: var(--text-bright); }
  .log-output .log-text { color: var(--emerald); }
  .log-error .log-text { color: #ff6060; }
  .log-system .log-text { color: rgba(59,130,246,0.8); }

  /* Command input */
  .cmd-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    align-items: stretch;
  }

  .cmd-prefix {
    display: flex;
    align-items: center;
    padding: 0 12px;
    background: var(--panel);
    border: 2px solid var(--border);
    border-top-color: var(--border-light);
    border-left-color: var(--border-light);
    color: var(--emerald);
    font-size: 20px;
    border-radius: 2px 0 0 2px;
    flex-shrink: 0;
  }

  .cmd-input-wrap {
    flex: 1;
    position: relative;
  }

  .cmd-input-wrap input {
    border-radius: 0;
    font-size: 20px;
    letter-spacing: 1px;
    border-right: none;
  }

  .cmd-send {
    padding: 0 16px;
    background: var(--emerald);
    color: #000;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 0 2px 2px 0;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .cmd-send:hover { background: #22ff77; }
  .cmd-send:active { background: #10cc50; }

  /* Quick actions */
  .quick-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .quick-btn {
    padding: 6px 12px;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    background: var(--panel);
    color: var(--text-dim);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
    border-radius: 2px;
  }

  .quick-btn:hover {
    border-color: var(--border-light);
    color: var(--text);
    background: var(--border);
  }

  /* Status strip */
  .status-strip {
    display: flex;
    gap: 16px;
    padding: 12px 16px;
    background: rgba(23,221,98,0.04);
    border: 1px solid rgba(23,221,98,0.12);
    border-radius: 2px;
    font-size: 15px;
    margin-top: 4px;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-label {
    color: var(--text-dim);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .stat-value {
    color: var(--emerald);
    font-size: 17px;
  }

  .stat-divider {
    width: 1px;
    background: var(--border);
    align-self: stretch;
  }

  /* Session bar */
  .session-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: rgba(255,215,0,0.04);
    border: 1px solid rgba(255,215,0,0.1);
    border-radius: 2px;
    margin-bottom: 20px;
  }

  .session-info {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 16px;
    color: var(--gold);
  }

  .session-dot {
    width: 6px;
    height: 6px;
    background: var(--gold);
    box-shadow: 0 0 6px rgba(255,215,0,0.5);
    animation: session-blink 3s ease-in-out infinite;
  }

  @keyframes session-blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Command history */
  .history-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
    min-height: 24px;
  }

  .history-tag {
    font-size: 14px;
    padding: 3px 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 2px;
  }

  .history-tag:hover {
    color: var(--text);
    border-color: var(--border-light);
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="topbar">
    <div class="topbar-title">⚙ MINECRAFT ADMIN</div>
    <div class="topbar-right">
      <a href="index.html" class="back-link">← BACK</a>
    </div>
  </div>

  <div class="card">

    <!-- LOGIN -->
    <div id="login">
      <div class="login-icon">🔐</div>
      <div class="login-title">ADMIN ACCESS</div>
      <div class="login-subtitle">Enter your credentials to continue</div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
      </div>

      <button class="btn btn-primary" onclick="login()">AUTHENTICATE</button>
      <div class="error-msg" id="msg"></div>
    </div>

    <!-- PANEL -->
    <div id="panel">
      <div class="session-bar">
        <div class="session-info">
          <div class="session-dot"></div>
          <span>Authenticated as <strong>Admin</strong></span>
        </div>
        <button class="btn btn-danger" onclick="logout()">LOGOUT</button>
      </div>

      <div class="panel-grid">
        <!-- Console -->
        <div>
          <div class="section-header">
            <div class="section-title">Server Console</div>
            <button class="btn btn-secondary" onclick="clearConsole()">CLEAR</button>
          </div>

          <div id="console"></div>

          <div class="cmd-row">
            <div class="cmd-prefix">/</div>
            <div class="cmd-input-wrap">
              <input type="text" id="cmd" placeholder="say Hello, World!" onkeydown="if(event.key==='Enter')send()">
            </div>
            <button class="cmd-send" onclick="send()">SEND ▶</button>
          </div>

          <!-- Quick actions -->
          <div class="quick-actions">
            <button class="quick-btn" onclick="quickCmd('list')">list</button>
            <button class="quick-btn" onclick="quickCmd('time set day')">set day</button>
            <button class="quick-btn" onclick="quickCmd('weather clear')">clear weather</button>
            <button class="quick-btn" onclick="quickCmd('gamerule doDaylightCycle false')">stop time</button>
            <button class="quick-btn" onclick="quickCmd('say Server restarting soon!')">announce</button>
          </div>
        </div>

        <!-- History -->
        <div>
          <div class="section-header">
            <div class="section-title">Recent Commands</div>
          </div>
          <div class="history-list" id="history-list">
            <span style="font-size:15px; color:var(--text-dim)">No commands yet...</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const password = "123456";
  let cmdHistory = [];

  function login() {
    const p = document.getElementById("pass").value;
    const msg = document.getElementById("msg");
    if (p === password) {
      document.getElementById("login").style.display = "none";
      document.getElementById("panel").style.display = "block";
      log("system", "SYS", "Session started. Welcome, Admin.");
      log("system", "SYS", "Type a command below or use quick actions.");
    } else {
      msg.textContent = "✗ Invalid password. Access denied.";
      document.getElementById("pass").value = "";
      document.getElementById("pass").focus();
      setTimeout(() => { msg.textContent = ""; }, 3000);
    }
  }

  function logout() {
    document.getElementById("login").style.display = "block";
    document.getElementById("panel").style.display = "none";
    document.getElementById("pass").value = "";
    document.getElementById("console").innerHTML = "";
    cmdHistory = [];
    renderHistory();
  }

  function getTime() {
    return new Date().toLocaleTimeString("en-US", { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  function log(type, prefix, text) {
    const box = document.getElementById("console");
    const div = document.createElement("div");
    div.className = `log-line log-${type}`;
    div.innerHTML = `<span class="log-time">[${getTime()}]</span><span class="log-prefix">${prefix}</span><span class="log-text">${text}</span>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function clearConsole() {
    document.getElementById("console").innerHTML = "";
    log("system", "SYS", "Console cleared.");
  }

  function renderHistory() {
    const list = document.getElementById("history-list");
    if (cmdHistory.length === 0) {
      list.innerHTML = '<span style="font-size:15px; color:var(--text-dim)">No commands yet...</span>';
      return;
    }
    list.innerHTML = [...cmdHistory].reverse().slice(0, 10).map(cmd =>
      `<span class="history-tag" onclick="document.getElementById('cmd').value='${cmd.replace(/'/g, "\\'")}'">/${cmd}</span>`
    ).join("");
  }

  async function send() {
    const input = document.getElementById("cmd");
    const cmd = input.value.trim();
    if (!cmd) return;

    input.value = "";
    log("cmd", ">", "/" + cmd);

    if (!cmdHistory.includes(cmd)) {
      cmdHistory.push(cmd);
      if (cmdHistory.length > 20) cmdHistory.shift();
    }
    renderHistory();

    try {
      const res = await fetch("/cmd", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ command: cmd })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const output = typeof data === "string" ? data : JSON.stringify(data, null, 2);
      output.split("\n").forEach(line => {
        if (line.trim()) log("output", "»", line);
      });
    } catch (err) {
      log("error", "✗", "Server error: " + err.message);
    }
  }

  function quickCmd(cmd) {
    document.getElementById("cmd").value = cmd;
    send();
  }
</script>
</body>
</html>
